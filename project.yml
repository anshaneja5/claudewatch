name: ClaudeWatch

options:
  bundleIdPrefix: com.claudewatch
  deploymentTarget:
    macOS: "14.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:

  # macOS Menu Bar App
  ClaudeWatchMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Shared
      - path: MacApp
    info:
      path: MacApp/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: ClaudeWatch
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudewatch.mac
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: ""

  # watchOS App
  ClaudeWatchWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared
      - path: WatchApp
        excludes:
          - "Complications/**"
    info:
      path: WatchApp/Info.plist
      properties:
        WKApplication: true
        CFBundleDisplayName: ClaudeWatch
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudewatch.watch
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: WatchApp/ClaudeWatch.entitlements

  # watchOS WidgetKit Complications Extension
  ClaudeWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Shared/Models
      - path: WatchApp/Complications
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudewatch.watch.complications
        INFOPLIST_FILE: WatchApp/Complications/Info.plist
        SKIP_INSTALL: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: ClaudeWatchWatchApp
        embed: true
